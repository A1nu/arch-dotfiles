# TLP drop-in for devnull (Tuxedo InfinityBook Pro, Intel Meteor Lake-P)
# Deployed to: /etc/tlp.d/10-laptop.conf
#
# tccd (TUXEDO Control Center) is also running and owns:
#   - Fan curves / TDP limits
#   - Platform profile (performance/balanced/low-power)
# TLP must NOT set PLATFORM_PROFILE_* to avoid daemon conflict.

# --- PCIe ASPM ---
# Let TLP set this dynamically per AC/BAT (better than kernel param pcie_aspm=)
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersupersave

# --- CPU energy/performance policy ---
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=power

# --- CPU scaling governor ---
CPU_SCALING_GOVERNOR_ON_AC=performance
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# --- NMI watchdog (already off by default in TLP 1.9, explicit for clarity) ---
NMI_WATCHDOG=0

# --- Runtime PM: more aggressive on battery ---
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# NOTE: PLATFORM_PROFILE_* intentionally omitted — tccd owns this.
