# TLP drop-in for devnull (Tuxedo InfinityBook Pro, Intel Meteor Lake-P)
# Deployed to: /etc/tlp.d/10-laptop.conf
#
# tccd (TUXEDO Control Center) is the CPU/TDP/fan/charging manager here
# (cpuSettingsEnabled=true -> it sets governor/EPP/turbo/freq and overrides TLP).
# So TLP must NOT touch the CPU or platform profile — it only handles what tccd doesn't:
# PCIe ASPM, USB, runtime-PM, Wi-Fi and audio power saving.
# Set the on-battery CPU/TDP profile in TUXEDO Control Center, not here.

# --- PCIe ASPM ---
# NOTE: powersupersave forces deep L1 substates with high link-exit latency and caused
# system-wide stutter + input lag on battery (Jun 2026). Use default (kernel/BIOS-managed).
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=default

# --- CPU governor/EPP/turbo: NOT set here — tccd owns the CPU (see header) ---

# --- NMI watchdog (already off by default in TLP 1.9, explicit for clarity) ---
NMI_WATCHDOG=0

# --- Runtime PM: more aggressive on battery ---
RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto

# --- Do NOT autosuspend USB devices: avoids peripheral/input wake-latency lag on battery ---
USB_AUTOSUSPEND=0

# --- Wi-Fi power saving on battery ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# --- Intel HDA audio codec power saving on battery ---
SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1

# NOTE: CPU + PLATFORM_PROFILE intentionally omitted — tccd owns those.
