# devnull lid behavior — deployed to /etc/systemd/logind.conf.d/10-lid-hibernate.conf
#
# Lid closed -> suspend-then-hibernate in all cases, including docked (no clamshell mode).
# sleep.conf's HibernateOnACPower=no keeps it in instant-resume suspend while plugged in,
# and only hibernates within ~HibernateDelaySec of being unplugged while closed. So:
#   - battery: hibernates after the delay -> zero drain.
#   - AC:      stays suspended (instant resume); hibernates ~10 min after you unplug closed.
[Login]
HandleLidSwitch=suspend-then-hibernate
HandleLidSwitchExternalPower=suspend-then-hibernate
HandleLidSwitchDocked=suspend-then-hibernate
