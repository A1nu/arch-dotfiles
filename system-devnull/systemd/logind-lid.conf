# devnull lid behavior — deployed to /etc/systemd/logind.conf.d/10-lid-hibernate.conf
#
# Lid closed:
#   - battery, no external display:  suspend-then-hibernate -> zero drain after delay.
#   - AC, no external display:       plain suspend (instant resume).
#   - docked (external display):     suspend-then-hibernate on battery; clamshell (stay
#     awake) on AC. logind can't split "docked" by power source, so clamshell-guard.sh
#     holds a handle-lid-switch inhibitor (clamshell-inhibit.service) only while on AC
#     with an external display. If that guard isn't running, a docked lid-close just
#     sleeps — i.e. it fails safe toward saving battery, never toward draining.
[Login]
HandleLidSwitch=suspend-then-hibernate
HandleLidSwitchExternalPower=suspend
HandleLidSwitchDocked=suspend-then-hibernate
