# devnull suspend-then-hibernate timing
# Deployed to /etc/systemd/sleep.conf.d/10-hibernate-delay.conf
#
# HibernateDelaySec: time in s2idle suspend before hibernating to disk (zero power).
#   600s = 10 min: quick resume if reopened soon, otherwise escalates to hibernate.
# HibernateOnACPower=no: while plugged in, do NOT hibernate at the delay — re-suspend
#   instead, so it stays instantly resumable while charging. Once on battery it hibernates
#   at the next ~10-min check. Net: AC closed = stays suspended; unplug-while-closed =
#   hibernates within ~10 min. (Only takes effect with HibernateDelaySec set.)
[Sleep]
HibernateDelaySec=600
HibernateOnACPower=no
