general {
  hide_cursor = true
  no_fade_in  = false
}

input {
  kb_layout = us
}

background {
  monitor =
  path    = /home/a1nu/Pictures/wallpapers/muichiro-tokito-5120x2880-16912.jpg
  blur_size    = 4
  blur_passes  = 2
  brightness   = 0.7
}

input-field {
  monitor =
  size = 280, 50
  position = 0, -80
  halign = center
  valign = center

  outline_thickness = 2
  inner_color  = rgba(0, 0, 0, 0.6)
  outer_color  = rgba(255, 255, 255, 0.4)
  check_color  = rgba(100, 200, 100, 0.9)
  fail_color   = rgba(200, 60, 60, 0.9)

  font_color   = rgb(255, 255, 255)
  font_size    = 16
  font_family  = monospace

  placeholder_text = <i>password</i>
  hide_input   = false
  dots_spacing = 0.3
  dots_center  = true
  fade_on_empty = true
}

label {
  monitor =
  text     = cmd[update:1000] echo "$(date +'%H:%M')"
  color    = rgba(255, 255, 255, 0.9)
  font_size   = 72
  font_family = monospace bold
  position = 0, 80
  halign = center
  valign = center
}

label {
  monitor =
  text     = cmd[update:60000] echo "$(date +'%A, %B %d')"
  color    = rgba(255, 255, 255, 0.7)
  font_size   = 18
  font_family = monospace
  position = 0, 0
  halign = center
  valign = center
}
