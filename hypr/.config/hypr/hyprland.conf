
############################
# Basic variables
############################
$mod = SUPER
$term = kitty
$launcher = wofi --show drun
$fileman = env UTIL_TERM=1 $term --class FM -e yazi
$taskman = env UTIL_TERM=1 $term --class HTOP -e btop

############################
# Environment (NVIDIA-friendly defaults)
############################
# These are common toggles that help Hyprland behave better on NVIDIA.
# If something breaks, you can comment them out one by one.
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = DESKTOP_SESSION,Hyprland
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:$HOME/.local/share:$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share

# Optional: avoid cursor scaling weirdness with XWayland apps
xwayland {
  force_zero_scaling = true
}

############################
# Monitors
############################
# EXAMPLE layout matching your Xorg:
# - Left:   2560x1440@165  at 0x0
# - Center: 2560x1440@240  at 2560x0 (primary)
# - Right:  2560x1440@165  at 5120x0
# - HDMI TV: auto right of center (you had HDMI-0 right-of DP-0, adjust as desired)
#
# Replace DP-X / HDMI-A-X with actual names from: hyprctl monitors
#
# Format:
# monitor = <name>, <resolution>@<refresh>, <x>x<y>, <scale>
#
# --- PLACEHOLDERS (EDIT THESE) ---
monitor = DP-2, 2560x1440@165, 0x0, 1
monitor = DP-1, 2560x1440@240, 2560x0, 1
monitor = DP-3, 2560x1440@165, 5120x0, 1
monitor = HDMI-A-1, preferred, 7680x0, 1

# Center (main) monitor
workspace = 1,  monitor:DP-1, default:true, persistent:true
workspace = 4,  monitor:DP-1, persistent:true
workspace = 7,  monitor:DP-1, persistent:true

# Left monitor
workspace = 2,  monitor:DP-2, persistent:true
workspace = 5,  monitor:DP-2, persistent:true
workspace = 8,  monitor:DP-2, persistent:true

# Right monitor
workspace = 3,  monitor:DP-3, persistent:true
workspace = 6,  monitor:DP-3, persistent:true
workspace = 9,  monitor:DP-3, persistent:true

# TV
workspace = 10, monitor:HDMI-A-1, persistent:true

############################
# Input
############################
input {
  kb_layout = us,ru
  kb_options = grp:alt_shift_toggle

  follow_mouse = 1
  sensitivity = 0.0
  accel_profile = flat
}

# Touchpad (safe defaults; adjust if needed)
device {
  name = *
  accel_profile = flat
}

############################
# General look & feel (keep it clean / low overhead)
############################
general {
  gaps_in = 6
  gaps_out = 10
  border_size = 2

  # You can set colors later; keeping minimal to reduce distraction.
  layout = dwindle
  allow_tearing = false
}

decoration {
  rounding = 6
  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  # Subtle animations; you can disable entirely if you want max "raw" feel.
  animation = windows, 1, 5, default
  animation = border,  1, 5, default
  animation = fade,    1, 5, default
  animation = workspaces, 1, 5, default
}

dwindle {
  pseudotile = true         # matches your "pseudo tile" mental model
  preserve_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
}

############################
# Autostart (Wayland session equivalents)
############################
# Import session env into systemd --user (because you run lots of things as user services)
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR
exec-once = systemctl --user start xsession.target

# Your audio defaults script (kept from Xorg; not X11-specific)
exec-once = ~/.local/bin/audio-set-defaults.sh

# Disable screen blanking is not an X11 thing anymore; handle it via:
# - hypridle + hyprlock (recommended), or
# - systemd/logind settings
# We bind a lock key below.

############################
# Window rules (ported from bspwm rules)
############################
# mpv floating + sticky/pin
# New windowrule syntax (windowrulev2 -> windowrule)
windowrule = match:class ^(mpv)$, float 1
windowrule = match:class ^(mpv)$, pin 1

windowrule = match:class ^(FM)$, float 1
windowrule = match:class ^(FM)$, center 1

windowrule = match:class ^(HTOP)$, float 1
windowrule = match:class ^(HTOP)$, center 1
# If you have special overlays, you can refine later with:
# hyprctl clients  -> class, title
# and then add rules like:
# windowrulev2 = float, class:^(mpv)$, title:^(eve_overlay)$
# windowrulev2 = size 369 609, class:^(mpv)$, title:^(eve_overlay)$
# windowrulev2 = move 385 45, class:^(mpv)$, title:^(eve_overlay)$

############################
# Keybinds (mirrors your sxhkd logic + Hyprland-specific extras)
############################

# --- Launcher keys ---
bind = $mod, RETURN, exec, $term
bind = $mod, E,      exec, $fileman
bind = $mod, SPACE,  exec, $launcher
bind = CTRL SHIFT,   ESCAPE, exec, $taskman

# --- Lockscreen (Wayland) ---
# Preferred: hyprlock. If not installed, install hyprlock or replace with swaylock.
bind = CTRL SHIFT, Q, exec, hyprlock || swaylock

# --- Reload config (like pkill -USR1 -x sxhkd) ---
bind = $mod, ESCAPE, exec, hyprctl reload

# --- Quit / Kill ---
bind = $mod ALT, Q, exec, hyprctl dispatch exit
bind = $mod SHIFT, Q, killactive
bind = $mod ALT, R, exec, hyprctl reload

# --- Toggle floating & fullscreen (same mental model) ---
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 1

# Hyprland-specific: pseudo-tile toggle (matches your super+p)
bind = $mod, P, pseudo

# Hyprland-specific: toggle split orientation (dwindle)
bind = $mod, B, togglesplit

# Hyprland-specific: toggle group (useful as "tabbing" alternative)
bind = $mod, G, togglegroup
bind = $mod SHIFT, G, changegroupactive, f
bind = $mod CTRL,  G, changegroupactive, b

# --- Focus move (HJKL) ---
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# --- Swap/move the focused window in layout (like bspc node -s) ---
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# --- Move window to another workspace direction (closest to bspc node -n) ---
# Hypr doesn't have a 1:1 "send to neighbor desktop" in tree terms.
# This is a practical alternative: move to workspace +/-1.
bind = $mod ALT, H, movetoworkspace, -1
bind = $mod ALT, L, movetoworkspace, +1

# --- Resize active window (approx your bspc node -z) ---
bind = $mod CTRL, H, resizeactive, -10 0
bind = $mod CTRL, L, resizeactive,  10 0
bind = $mod CTRL, K, resizeactive,  0 -10
bind = $mod CTRL, J, resizeactive,  0  10

bind = $mod CTRL SHIFT, H, resizeactive, -100 0
bind = $mod CTRL SHIFT, L, resizeactive,  100 0
bind = $mod CTRL SHIFT, K, resizeactive,  0 -100
bind = $mod CTRL SHIFT, J, resizeactive,  0  100

# --- Move floating window by arrows (small/big steps) ---
bind = $mod, UP,    moveactive, 0 -10
bind = $mod, DOWN,  moveactive, 0  10
bind = $mod, LEFT,  moveactive, -10 0
bind = $mod, RIGHT, moveactive,  10 0

bind = $mod SHIFT, UP,    moveactive, 0 -100
bind = $mod SHIFT, DOWN,  moveactive, 0  100
bind = $mod SHIFT, LEFT,  moveactive, -100 0
bind = $mod SHIFT, RIGHT, moveactive,  100 0

# --- Layout switch (monocle/tiling) ---
# Hyprland "fullscreen" is the closest "monocle"; also has layout toggles:
bind = $mod, M, togglespecialworkspace, overview

# --- Workspaces 1..10 (0=10) ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Sticky (pin) ---
bind = $mod, S, pin

# --- Audio / media / brightness (same as your sxhkd) ---
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,     exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

bindl = , XF86Tools,         exec, ~/.local/bin/toggle-sink.sh
bindl = SHIFT, XF86Tools,    exec, ~/.local/bin/toggle-hdmi --move-active

bindl = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Screenshot to clipboard (Wayland replacement for maim + xclip) ---
bind = $mod CTRL, 4, exec, grim -g "$(slurp)" - | wl-copy -t image/png

############################
# Mouse binds (Hyprland-specific)
############################
bindm = $mod, mouse:272, movewindow   # left click drag
bindm = $mod, mouse:273, resizewindow # right click drag

############################
# Optional: "gaming" helper binds (Hyprland-specific)
############################
# Toggle tearing (if you ever want it per-session for specific games)
# bind = $mod SHIFT, T, exec, hyprctl keyword general:allow_tearing true
# bind = $mod CTRL,  T, exec, hyprctl keyword general:allow_tearing false

############################
# Special workspace (Hyprland scratchpad-style)
############################
# A convenient scratchpad workspace you can toggle.
bind = $mod, S, togglespecialworkspace, scratch
bind = $mod SHIFT, S, movetoworkspace, special:scratch

# Notification Center toggle
bind = SUPER, N, exec, swaync-client -t

# Clear notifications
bind = SUPER SHIFT, N, exec, swaync-client -C

# Do Not Disturb toggle
bind = SUPER, M, exec, swaync-client -d -t
