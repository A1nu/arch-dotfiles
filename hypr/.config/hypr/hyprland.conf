
############################
# Basic variables
############################
$mod = SUPER
$term = kitty
$launcher = wofi --show drun
$fileman = env UTIL_TERM=1 $term --class FM -e yazi
$taskman = env UTIL_TERM=1 $term --class HTOP -e btop

############################
# Environment
############################
# GPU/device-specific vars live in host.conf.
# On each device, symlink once:
#   ln -sf ~/.config/hypr/hosts/<hostname>.conf ~/.config/hypr/host.conf
source = ~/.config/hypr/host.conf

env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = DESKTOP_SESSION,Hyprland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_DATA_DIRS,/usr/local/share:/usr/share:$HOME/.local/share:$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share

# Optional: avoid cursor scaling weirdness with XWayland apps
xwayland {
  force_zero_scaling = true
}

############################
# Monitors & Workspaces
############################
# Defined per-device in host.conf

############################
# Input
############################
input {
  kb_layout = us,ru

  follow_mouse = 1
  sensitivity = 0.0
  accel_profile = flat

  touchpad {
    natural_scroll = true
  }
}

# Touchpad (safe defaults; adjust if needed)
device {
  name = *
  accel_profile = flat
}

############################
# General look & feel (keep it clean / low overhead)
############################
general {
  gaps_in = 6
  gaps_out = 10
  border_size = 2

  # You can set colors later; keeping minimal to reduce distraction.
  layout = dwindle
  allow_tearing = false
}

decoration {
  rounding = 6
  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  # Subtle animations; you can disable entirely if you want max "raw" feel.
  animation = windows, 1, 5, default
  animation = border,  1, 5, default
  animation = fade,    1, 5, default
  animation = workspaces, 1, 5, default
}

dwindle {
  pseudotile = true         # matches your "pseudo tile" mental model
  preserve_split = true
}

master {
  new_status = master
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
  vfr = true
}

############################
# Autostart (Wayland session equivalents)
############################
# Import session env into systemd --user (because you run lots of things as user services)
exec-once = hyprland-per-window-layout
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XDG_RUNTIME_DIR
exec-once = systemctl --user start xsession.target


# Disable screen blanking is not an X11 thing anymore; handle it via:
# - hypridle + hyprlock (recommended), or
# - systemd/logind settings
# We bind a lock key below.

############################
# Window rules (ported from bspwm rules)
############################
windowrule {
    name = mpv-float-pin
    match:class = ^(mpv)$
    float = yes
    pin = yes
}

windowrule {
    name = fm-float-center
    match:class = ^(FM)$
    float = yes
    center = yes
}

windowrule {
    name = htop-float-center
    match:class = ^(HTOP)$
    float = yes
    center = yes
}

windowrule {
    name = kagerou-overlay
    match:title = ^(Kagerou)$
    float = on
    pin = on
    border_size = 0
}

# EVE overlay (uncomment and tune if needed):
# windowrule {
#     name = eve-overlay
#     match:class = ^(mpv)$
#     match:title = ^(eve_overlay)$
#     float = yes
#     pin = yes
#     size = 369 609
