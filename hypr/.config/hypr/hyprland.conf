############################
# Keybinds (mirrors your sxhkd logic + Hyprland-specific extras)
############################

# --- Launcher keys ---
bind = $mod, RETURN, exec, $term
bind = $mod, E,      exec, $fileman
bind = $mod, SPACE,  exec, $launcher
bind = CTRL SHIFT,   ESCAPE, exec, $taskman

# --- Lockscreen (Wayland) ---
# Preferred: hyprlock. If not installed, install hyprlock or replace with swaylock.
bind = CTRL SHIFT, Q, exec, hyprlock || swaylock

# --- Keyboard layout toggle ---
bind = CTRL, SPACE, exec, hyprctl switchxkblayout all next

# --- Reload config (like pkill -USR1 -x sxhkd) ---
bind = $mod, ESCAPE, exec, hyprctl reload

# --- Quit / Kill ---
bind = $mod ALT, Q, exec, hyprctl dispatch exit
bind = $mod SHIFT, Q, killactive
bind = $mod ALT, R, exec, hyprctl reload

# --- Toggle floating & fullscreen (same mental model) ---
bind = $mod, V, togglefloating
bind = $mod, F, fullscreen, 1

# Hyprland-specific: pseudo-tile toggle (matches your super+p)
bind = $mod, P, pseudo

# Hyprland-specific: toggle split orientation (dwindle)
bind = $mod, B, togglesplit

# Hyprland-specific: toggle group (useful as "tabbing" alternative)
bind = $mod, G, togglegroup
bind = $mod SHIFT, G, changegroupactive, f
bind = $mod CTRL,  G, changegroupactive, b

# --- Focus move (HJKL) ---
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# --- Swap/move the focused window in layout (like bspc node -s) ---
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# --- Move window to another workspace direction (closest to bspc node -n) ---
# Hypr doesn't have a 1:1 "send to neighbor desktop" in tree terms.
# This is a practical alternative: move to workspace +/-1.
bind = $mod ALT, H, movetoworkspace, -1
bind = $mod ALT, L, movetoworkspace, +1

# --- Resize active window (approx your bspc node -z) ---
bind = $mod CTRL, H, resizeactive, -10 0
bind = $mod CTRL, L, resizeactive,  10 0
bind = $mod CTRL, K, resizeactive,  0 -10
bind = $mod CTRL, J, resizeactive,  0  10

bind = $mod CTRL SHIFT, H, resizeactive, -100 0
bind = $mod CTRL SHIFT, L, resizeactive,  100 0
bind = $mod CTRL SHIFT, K, resizeactive,  0 -100
bind = $mod CTRL SHIFT, J, resizeactive,  0  100

# --- Move floating window by arrows (small/big steps) ---
bind = $mod, UP,    moveactive, 0 -10
bind = $mod, DOWN,  moveactive, 0  10
bind = $mod, LEFT,  moveactive, -10 0
bind = $mod, RIGHT, moveactive,  10 0

bind = $mod SHIFT, UP,    moveactive, 0 -100
bind = $mod SHIFT, DOWN,  moveactive, 0  100
bind = $mod SHIFT, LEFT,  moveactive, -100 0
bind = $mod SHIFT, RIGHT, moveactive,  100 0

# --- Workspaces 1..10 (0=10) ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Sticky (pin) — same as bspwm super+s ---
bind = $mod, S, pin

# --- Audio / media / brightness (same as your sxhkd) ---
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume    @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,        exec, wpctl set-mute      @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute,     exec, wpctl set-mute      @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioNext,  exec, playerctl next
bindl = , XF86AudioPrev,  exec, playerctl previous

bindl = , XF86Tools,         exec, ~/.local/bin/toggle-sink.sh
bindl = SHIFT, XF86Tools,    exec, ~/.local/bin/toggle-hdmi --move-active

bindl = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindl = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Screenshot to clipboard (Wayland replacement for maim + xclip) ---
bind = $mod CTRL, 4, exec, grim -g "$(slurp)" - | wl-copy -t image/png

############################
# Mouse binds (Hyprland-specific)
############################
bindm = $mod, mouse:272, movewindow   # left click drag
bindm = $mod, mouse:273, resizewindow # right click drag

############################
# Optional: "gaming" helper binds (Hyprland-specific)
############################
# Toggle tearing (if you ever want it per-session for specific games)
# bind = $mod SHIFT, T, exec, hyprctl keyword general:allow_tearing true
# bind = $mod CTRL,  T, exec, hyprctl keyword general:allow_tearing false

############################
# Special workspace (Hyprland scratchpad-style)
############################
# super+grave to toggle scratchpad (super+s is taken by pin/sticky)
bind = $mod, grave, togglespecialworkspace, scratch
bind = $mod SHIFT, grave, movetoworkspace, special:scratch

# Notification Center toggle
bind = SUPER, N, exec, swaync-client -t

# Kagerou DPS overlay toggle
bind = $mod, F9, exec, pidof hudkit-wayland && pkill hudkit-wayland || WEBKIT_DISABLE_DMABUF_RENDERER=1 hudkit-wayland ~/.config/hudkit/kagerou.json &

# Clear notifications
bind = SUPER SHIFT, N, exec, swaync-client -C

# Do Not Disturb toggle
bind = SUPER, M, exec, swaync-client -d -t
