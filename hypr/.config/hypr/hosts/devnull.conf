############################
# devnull — Intel Arc (Mesa/iHD)
############################
env = LIBVA_DRIVER_NAME,iHD

# Set keyboard backlight on login so save/restore works correctly
exec-once = brightnessctl -d white:kbd_backlight s 2

############################
# Monitors
############################
monitor = eDP-1, 2880x1800@120, 0x0, 1.25
# Any connected external display gets auto-detected
monitor = , preferred, auto, 1

############################
# Window rules
############################
windowrule {
    name = mpv-pip-position
    match:class = ^(mpv)$
    size = 800 450
    move = 1494 10
}

############################
# Workspaces
############################
# Odd workspaces stay on the laptop screen
workspace = 1,  monitor:eDP-1, default:true, persistent:true
workspace = 3,  monitor:eDP-1, persistent:true
workspace = 5,  monitor:eDP-1, persistent:true
workspace = 7,  monitor:eDP-1, persistent:true
workspace = 9,  monitor:eDP-1, persistent:true
# Even workspaces: no monitor assignment — default to eDP-1 when no external
# monitor is connected; hypr-monitor-watch.sh moves them on hotplug
workspace = 2,  persistent:true
workspace = 4,  persistent:true
workspace = 6,  persistent:true
workspace = 8,  persistent:true
workspace = 10, persistent:true

exec-once = ~/.local/bin/hypr-monitor-watch.sh
