############################
# devnull — Intel Arc (Mesa/iHD)
############################
env = LIBVA_DRIVER_NAME,iHD

# Set keyboard backlight on login so save/restore works correctly
exec-once = brightnessctl -d white:kbd_backlight s 2

############################
# Monitors
############################
source = ~/.config/hypr/monitors.conf
############################
# Window rules
############################
windowrule {
    name = mpv-pip-position
    match:class = ^(mpv)$
    size = 800 450
    move = 1494 10
}

############################
# Workspaces (1-9 only, distributed by hypr-monitor-watch.sh)
# No persistent:true — otherwise waybar shows all on every bar
############################
workspace = 1,  default:true

exec-once = ~/.local/bin/hypr-monitor-watch.sh
