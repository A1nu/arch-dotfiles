# devnull (laptop) — keyboard dim, DPMS off, suspend on idle

# Dim keyboard with screen (same 3 minute timeout)
listener {
  timeout = 180
  on-timeout = brightnessctl -d white:kbd_backlight -s s 0
  on-resume = brightnessctl -d white:kbd_backlight -r
}

# Turn screen + keyboard off after 8 minutes
listener {
  timeout = 480
  on-timeout = hyprctl dispatch dpms off && brightnessctl -d white:kbd_backlight s 0
  on-resume = hyprctl dispatch dpms on ; brightnessctl -d white:kbd_backlight -r
}

# Suspend after 15 minutes
listener {
  timeout = 900
  on-timeout = systemctl suspend
}
