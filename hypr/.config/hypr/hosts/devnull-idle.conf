# devnull (laptop) — keyboard dim, DPMS off, suspend on idle

# Dim keyboard with screen (same 3 minute timeout)
listener {
  timeout = 180
  on-timeout = brightnessctl -d white:kbd_backlight -s s 0
  on-resume = brightnessctl -d white:kbd_backlight -r
}

# Turn screen + keyboard off after 8 minutes — but NOT when docked.
# The gate script skips DPMS off if an external display is connected (dock drift
# while blanked has crashed the compositor); dim + lock still apply when docked.
listener {
  timeout = 480
  on-timeout = $HOME/.config/hypr/scripts/hypr-idle-dpms.sh
  on-resume = hyprctl dispatch dpms on ; brightnessctl -d white:kbd_backlight -r
}

# Suspend-then-hibernate after 15 min idle (battery only).
# Escalates to hibernate after the delay in /etc/systemd/sleep.conf.d/ -> zero drain.
listener {
  timeout = 900
  on-timeout = [ "$(cat /sys/class/power_supply/AC0/online)" = "0" ] && systemctl suspend-then-hibernate
}
