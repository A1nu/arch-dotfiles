# Better history
set -g history-limit 10000

# Terminal / color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-kitty:Tc"
set -g allow-passthrough on
set -g extended-keys on

# Fix nvim escape delay and focus events
set -sg escape-time 10
set -g focus-events on

# Mouse support
set -g mouse on
set -g set-clipboard on

# Vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Split shortcuts (like i3/bspwm style)
bind | split-window -h         # prefix + |
bind - split-window -v         # prefix + -
unbind '"'
unbind %

# Pane navigation with vim-like keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"
# TPM itself
set -g @plugin 'tmux-plugins/tpm'

# Tokyo Night theme
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'fabioluciano/tmux-powerkit'

set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"
set -g @powerkit_plugins "ssh,git,packages,uptime,battery,weather,cpu,memory,datetime"

set -g @powerkit_weather_location "Tallinn"
set -g @powerkit_weather_unit "m"
set -g @powerkit_weather_cache_ttl 1800
set -g @powerkit_weather_format "compact"
set -g @powerkit_weather_icon_mode "static"
set -g @powerkit_weather_max_requests_per_hour 500

set -g @floax-bind 't'
set -g @floax-bind-menu 'T'

# IMPORTANT: use $HOME instead of ~ on macOS
run-shell "$HOME/.tmux/plugins/tpm/tpm"

bind p previous-window

